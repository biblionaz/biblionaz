<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IDN Distrito Sur Fronterizo | Biblioteca Virtual</title>
    <!-- Librerias Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        
        :root { 
            --primary: #3b82f6; 
            --bg-dark: #020617; 
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-dark); 
            color: white; 
            scroll-behavior: smooth;
            margin: 0;
            overflow-x: hidden;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .main-title { 
            font-weight: 900; 
            letter-spacing: -0.05em; 
            line-height: 0.9; 
            white-space: nowrap;
            display: inline-block;
            font-size: clamp(3rem, 13vw, 11rem);
        }

        .text-glow { 
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.3); 
        }

        .gradient-bg { 
            background: radial-gradient(circle at 50% -10%, #1e40af, #020617 85%); 
        }

        .book-card { 
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
        }

        @media (hover: hover) {
            .book-card:hover { 
                transform: translateY(-8px); 
                border-color: rgba(59, 130, 246, 0.3); 
                background: rgba(255, 255, 255, 0.04); 
            }
        }

        #adminModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 100; 
            background: rgba(0, 0, 0, 0.98); 
            backdrop-filter: blur(15px); 
            align-items: center; 
            justify-content: center; 
        }

        .no-scrollbar::-webkit-scrollbar { 
            display: none; 
        }

        .loader { 
            width: 24px; 
            height: 24px; 
            border: 3px solid rgba(255,255,255,0.1); 
            border-bottom-color: #3b82f6; 
            border-radius: 50%; 
            display: inline-block; 
            animation: rotation 1s linear infinite; 
        }

        @keyframes rotation { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        input, select, textarea, button {
            font-family: 'Outfit', sans-serif !important;
        }
    </style>
</head>
<body class="selection:bg-blue-600 selection:text-white">

    <nav class="fixed top-0 w-full z-50 px-2 sm:px-4 py-4 sm:py-6">
        <div class="max-w-7xl mx-auto glass rounded-2xl sm:rounded-[2.5rem] px-4 sm:px-8 py-3 sm:py-5 flex justify-between items-center shadow-2xl border-white/5">
            <!-- Logo e Identidad -->
            <div class="flex items-center gap-4 sm:gap-5 flex-[4]">
                <div class="w-12 h-12 sm:w-16 sm:h-16 flex-shrink-0 flex items-center justify-center">
                    <img src="https://lh3.googleusercontent.com/u/0/d/1VGD1Gomo6PL_MyMh2QIcW0smy7jhGCFW=w200-h200" alt="IDN Logo" class="w-full h-full object-contain brightness-110">
                </div>
                <div class="min-w-0">
                     <h2 class="font-black text-[11px] sm:text-xl tracking-tighter leading-none uppercase truncate whitespace-nowrap">
                        <span class="text-white">IDN DISTRITO</span> <span class="text-blue-500">SUR FRONTERIZO</span>
                     </h2>
                </div>
            </div>
            
            <!-- Botones -->
            <div class="flex items-center gap-3 sm:gap-6 flex-1 justify-end">
                <button id="adminBtn" onclick="window.toggleAdminModal()" class="hidden text-[9px] font-black text-blue-400 tracking-widest hover:text-white transition-all uppercase underline underline-offset-4">Panel</button>
                <button id="accessBtn" onclick="window.handleAccess()" class="bg-white text-black px-4 sm:px-8 py-2.5 sm:py-3.5 rounded-xl sm:rounded-2xl text-[9px] sm:text-[10px] font-black hover:bg-blue-600 hover:text-white transition-all uppercase tracking-widest shadow-xl active:scale-95 whitespace-nowrap">
                    Acceso
                </button>
            </div>
        </div>
    </nav>

    <header class="relative min-h-[60vh] sm:min-h-[85vh] flex flex-col items-center justify-center gradient-bg px-4 text-center overflow-hidden pt-36 sm:pt-48">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 sm:w-96 sm:h-96 bg-blue-600/10 rounded-full blur-[80px] sm:blur-[120px] animate-pulse"></div>
        <div class="relative z-10 space-y-4 sm:space-y-6 w-full max-w-7xl">
            <!-- Titulo Principal -->
            <h1 class="main-title text-white text-glow uppercase select-none px-2">
                 BIBLIO<span class="text-blue-600">NAZ</span>
            </h1>
            <p class="text-blue-400/60 font-black text-[8px] sm:text-sm tracking-[0.3em] sm:tracking-[0.6em] uppercase mb-6 sm:mb-12">Recursos Digitales para el Ministerio</p>
            
            <div class="relative max-w-2xl mx-auto w-full group px-2">
                <div class="absolute inset-0 bg-blue-600/20 blur-3xl opacity-0 group-focus-within:opacity-100 transition-opacity"></div>
                <input type="text" id="searchInput" placeholder="BUSCAR RECURSOS..." class="relative w-full glass py-5 sm:py-7 px-10 sm:px-14 rounded-full border-white/10 text-xs sm:text-base focus:outline-none focus:border-blue-500/50 text-center tracking-[0.1em] sm:tracking-[0.2em] transition-all uppercase font-light">
                <i data-lucide="search" class="absolute left-6 sm:left-8 top-5 sm:top-7 w-4 h-4 sm:w-6 sm:h-6 opacity-20"></i>
            </div>
        </div>
    </header>

    <section id="catalogo" class="max-w-7xl mx-auto px-4 sm:px-6 py-12 sm:py-24">
        <div class="flex flex-col md:flex-row items-start md:items-end justify-between mb-10 sm:mb-16 gap-6 sm:gap-8">
            <div class="space-y-2 sm:space-y-3">
                <span class="text-blue-500 font-black text-[9px] sm:text-[10px] tracking-[0.4em] sm:tracking-[0.5em] uppercase block">Explorar</span>
                <h3 class="text-3xl sm:text-5xl font-black tracking-tighter uppercase leading-none">BIBLIOTECA <span class="text-white/10">VIRTUAL</span></h3>
            </div>
            <div id="categoryFilters" class="flex gap-2 overflow-x-auto no-scrollbar pb-2 w-full md:max-w-max"></div>
        </div>
        
        <div id="booksGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-10">
            <div id="loadingIndicator" class="col-span-full text-center py-20 sm:py-32">
                <div class="loader mb-4 sm:mb-6"></div>
                <p class="text-[10px] sm:text-[11px] font-bold tracking-[0.4em] sm:tracking-[0.6em] opacity-30 uppercase">Sincronizando biblioteca...</p>
            </div>
        </div>
    </section>

    <!-- Modal de Administracion -->
    <div id="adminModal">
        <div class="glass max-w-xl w-full p-6 sm:p-12 rounded-3xl sm:rounded-[3.5rem] border-white/10 relative mx-4 max-h-[92vh] overflow-y-auto no-scrollbar shadow-3xl">
            <button onclick="window.toggleAdminModal()" class="absolute top-6 right-6 sm:top-10 sm:right-10 text-white/20 hover:text-white transition-colors">
                <i data-lucide="x-circle" class="w-7 h-7 sm:w-9 sm:h-9"></i>
            </button>
            <div class="text-center mb-8 sm:mb-10">
                <h3 class="text-2xl sm:text-3xl font-black tracking-tighter uppercase mb-2">AGREGAR <span class="text-blue-500">RECURSO</span></h3>
                <p class="text-white/30 text-[8px] sm:text-[9px] font-bold uppercase tracking-[0.3em]">Gestion de Enlaces</p>
            </div>
            <form id="uploadForm" class="space-y-3 sm:space-y-4">
                <input type="text" id="bookTitle" placeholder="TITULO" class="w-full bg-white/5 border border-white/10 rounded-xl sm:rounded-2xl py-3 sm:py-4 px-5 sm:px-7 outline-none focus:border-blue-500 uppercase text-[10px] font-bold transition-all" required>
                <select id="bookCategory" class="w-full bg-slate-900 border border-white/10 rounded-xl sm:rounded-2xl py-3 sm:py-4 px-5 sm:px-7 outline-none text-[10px] font-black uppercase cursor-pointer focus:border-blue-500 transition-all" required>
                    <option value="" disabled selected>SELECCIONAR CATEGORIA</option>
                    <option value="ADMINISTRACION">ADMINISTRACION</option>
                    <option value="CRISTOLOGIA">CRISTOLOGIA</option>
                    <option value="DISCIPULADO">DISCIPULADO</option>
                    <option value="EDUCACION CRISTIANA">EDUCACION CRISTIANA</option>
                    <option value="ESCATOLOGIA">ESCATOLOGIA</option>
                    <option value="ESTUDIOS BIBLICOS">ESTUDIOS BIBLICOS</option>
                    <option value="EVANGELISMO">EVANGELISMO</option>
                    <option value="FINANZAS">FINANZAS</option>
                    <option value="GEOGRAFIA">GEOGRAFIA</option>
                    <option value="HISTORIA">HISTORIA</option>
                    <option value="LIDERAZGO">LIDERAZGO</option>
                    <option value="MANUALES">MANUALES Y REGLAMENTOS</option>
                    <option value="NEUMOLOGIA">NEUMOLOGIA</option>
                    <option value="PSICOLOGIA">PSICOLOGIA</option>
                    <option value="SOCIOLOGIA">SOCIOLOGIA</option>
                    <option value="TEOLOGIA">TEOLOGIA</option>
                </select>
                <textarea id="bookDesc" placeholder="DESCRIPCION..." class="w-full bg-white/5 border border-white/10 rounded-xl sm:rounded-2xl py-3 sm:py-4 px-5 sm:px-7 h-20 sm:h-24 outline-none text-[10px] uppercase focus:border-blue-500 transition-all" required></textarea>
                <div class="space-y-2 pt-4 border-t border-white/5">
                    <p class="text-[8px] font-black text-blue-500 tracking-[0.2em] uppercase">Enlaces Directos (Google Drive)</p>
                    <input type="url" id="bookUrl" placeholder="LINK PDF DRIVE (Compartido)" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-5 outline-none focus:border-blue-500 text-[10px]" required>
                    <input type="url" id="bookCoverUrl" placeholder="LINK PORTADA IMAGEN DRIVE" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-5 outline-none focus:border-blue-500 text-[10px]" required>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 py-4 sm:py-6 mt-4 rounded-xl sm:rounded-2xl font-black uppercase text-[11px] sm:text-[12px] tracking-[0.2em] hover:bg-blue-500 transition-all shadow-xl">
                    GUARDAR RECURSO
                </button>
            </form>
        </div>
    </div>

    <!-- Script de Logica y Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBN0eWd2_oeuZ00xnFgXdW4deVCStAFPkc",
          authDomain: "biblionaz.firebaseapp.com",
          projectId: "biblionaz",
          storageBucket: "biblionaz.firebasestorage.app", 
          messagingSenderId: "642836204657",
          appId: "1:642836204657:web:fb425f9e45d27b27005fd0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let globalData = [], isAdmin = false;

        signInAnonymously(auth);

        window.toggleAdminModal = () => {
            const m = document.getElementById('adminModal');
            if (m) m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        };

        window.handleAccess = () => {
            isAdmin = !isAdmin;
            const accessBtn = document.getElementById('accessBtn');
            const adminPanelBtn = document.getElementById('adminBtn');
            
            if (accessBtn) {
                accessBtn.innerText = isAdmin ? 'SALIR' : 'ACCESO';
                accessBtn.classList.toggle('bg-red-600', isAdmin);
                accessBtn.classList.toggle('text-white', isAdmin);
                accessBtn.classList.toggle('bg-white', !isAdmin);
                accessBtn.classList.toggle('text-black', !isAdmin);
            }
            if (adminPanelBtn) {
                adminPanelBtn.style.display = isAdmin ? 'block' : 'none';
            }
            renderBooks(globalData);
        };

        window.filter = (c) => {
            renderBooks(c === 'TODOS' ? globalData : globalData.filter(b => b.category === c));
        };

        async function performDelete(id) {
            if (confirm("żSeguro que deseas eliminar este recurso?")) {
                try {
                    await deleteDoc(doc(db, "books", id));
                } catch (e) {
                    console.error("Error al eliminar:", e);
                }
            }
        }

        document.getElementById('booksGrid').addEventListener('click', (e) => {
            const deleteBtn = e.target.closest('.delete-btn');
            if (deleteBtn) {
                const id = deleteBtn.getAttribute('data-id');
                performDelete(id);
            }
        });

        function getDrivePreview(url) {
            if (url && url.includes('drive.google.com')) {
                const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                return match ? `https://drive.google.com/file/d/${match[1]}/view?usp=sharing` : url;
            }
            return url;
        }

        function fixDriveLink(url) {
            if (url && url.includes('drive.google.com')) {
                const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                return match ? `https://lh3.googleusercontent.com/u/0/d/${match[1]}=w800-h1200?authuser=0` : url;
            }
            return url;
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const q = query(collection(db, "books"), orderBy("createdAt", "desc"));
                onSnapshot(q, (snap) => {
                    globalData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderFilters();
                    renderBooks(globalData);
                    const loader = document.getElementById('loadingIndicator');
                    if (loader) loader.style.display = 'none';
                });
            }
        });

        function renderFilters() {
            const box = document.getElementById('categoryFilters');
            if (!box) return;
            const cats = ['TODOS', ...new Set(globalData.map(b => b.category))].sort((a, b) => {
                if(a === 'TODOS') return -1;
                if(b === 'TODOS') return 1;
                return a.localeCompare(b);
            });
            box.innerHTML = cats.map(c => `
                <button onclick="window.filter('${c}')" class="whitespace-nowrap px-6 sm:px-8 py-2 sm:py-3 rounded-xl sm:rounded-2xl glass text-[9px] sm:text-[10px] font-black uppercase tracking-widest border border-white/5 hover:bg-blue-600 transition-all">
                    ${c}
                </button>
            `).join('');
        }

        function renderBooks(list) {
            const grid = document.getElementById('booksGrid');
            if (!grid) return;
            
            if (list.length === 0) {
                grid.innerHTML = '<div class="col-span-full opacity-20 text-center py-20 font-black uppercase tracking-widest text-[10px]">Sin recursos</div>';
                return;
            }

            grid.innerHTML = list.map(b => {
                const previewLink = getDrivePreview(b.link);
                return `
                <div class="book-card glass rounded-[2rem] sm:rounded-[2.5rem] p-5 sm:p-6 flex flex-col border border-white/5 relative shadow-xl">
                    ${isAdmin ? `
                    <button data-id="${b.id}" class="delete-btn absolute top-3 right-3 sm:top-4 sm:right-4 z-30 bg-red-600/90 text-white p-2.5 sm:p-3 rounded-full hover:bg-red-700 transition-all shadow-2xl active:scale-90">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5 sm:w-4 sm:h-4"></i>
                    </button>` : ''}
                    
                    <div class="relative h-60 sm:h-72 rounded-2xl sm:rounded-3xl overflow-hidden mb-5 sm:mb-6 bg-slate-900 shadow-inner">
                        <img src="${b.image}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x450?text=SIN+PORTADA'">
                        <div class="absolute top-3 left-3 bg-blue-600/90 px-3 py-1.5 rounded-lg text-[7px] font-black uppercase tracking-wider">${b.category}</div>
                    </div>
                    
                    <h4 class="text-lg sm:text-xl font-black uppercase tracking-tighter mb-2 line-clamp-1">${b.title}</h4>
                    <p class="text-[9px] sm:text-[10px] text-white/30 uppercase line-clamp-2 mb-6 sm:mb-8 font-medium leading-relaxed">${b.description}</p>
                    
                    <div class="flex gap-2 sm:gap-3 mt-auto">
                        <button onclick="window.open('${previewLink}')" class="flex-1 py-3.5 sm:py-4 glass rounded-xl sm:rounded-2xl text-[8px] sm:text-[9px] font-black uppercase hover:bg-white/10 transition-all tracking-widest">Ver Online</button>
                        <a href="${b.link}" target="_blank" class="flex-1 py-3.5 sm:py-4 bg-blue-600 rounded-xl sm:rounded-2xl text-[8px] sm:text-[9px] font-black uppercase text-center hover:bg-blue-500 transition-all tracking-widest shadow-lg">Descargar</a>
                    </div>
                </div>
            `;}).join('');

            if (window.lucide) window.lucide.createIcons();
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "PROCESANDO...";
            try {
                await addDoc(collection(db, "books"), {
                    title: document.getElementById('bookTitle').value.toUpperCase(),
                    category: document.getElementById('bookCategory').value,
                    description: document.getElementById('bookDesc').value.toUpperCase(),
                    image: fixDriveLink(document.getElementById('bookCoverUrl').value),
                    link: document.getElementById('bookUrl').value,
                    createdAt: serverTimestamp()
                });
                window.toggleAdminModal();
                e.target.reset();
            } catch(err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "GUARDAR RECURSO";
            }
        });

        document.getElementById('searchInput').oninput = (e) => {
            const q = e.target.value.toLowerCase();
            renderBooks(globalData.filter(b => 
                (b.title && b.title.toLowerCase().includes(q)) || 
                (b.category && b.category.toLowerCase().includes(q))
            ));
        };

    </script>
</body>
</html>
